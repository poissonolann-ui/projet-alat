<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ACHIEVE — Your Dream</title>
  <meta name="description" content="Préparation physique pilote ALAT — poste de pilotage personnel. Cap sur le 5e RHC de Pau." />
  <meta name="theme-color" content="#070809" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ACHIEVE" />

  <link rel="preload" as="image" href="aircraft/rafale-solo-climb.webp" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/fonts.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/hud.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/topgun.css" />
</head>
<body class="home">
  <a class="skip-link" href="#instruments">Aller au contenu</a>

  <!-- ===================== HERO — POST-COMBUSTION ===================== -->
  <header class="tg-hero">
    <div class="tg-hero-media">
      <img src="aircraft/rafale-solo-climb.webp"
           alt="Rafale Solo Display en post-combustion, montée verticale" fetchpriority="high" decoding="async" />
    </div>
    <span class="tg-afterburn" aria-hidden="true"></span>

    <div class="tg-hero-inner">
      <p class="kicker">Préparation · Sélection pilote ALAT</p>
      <h1>ACHIEVE<span class="dream">YOUR DREAM</span></h1>
      <a class="cta-launch" data-launch href="today.html">
        <span class="glyph">▸▸</span> Entrer dans la préparation
      </a>
    </div>
  </header>

  <main id="instruments">
    <!-- ===================== COMPTEUR DE MISSION ===================== -->
    <section class="home-section" data-reveal>
      <div class="mission-timer" data-countdown></div>
    </section>

    <!-- ===================== CADRANS OBJECTIFS ===================== -->
    <section class="home-section" data-reveal>
      <p class="home-eyebrow">Objectifs · Instruments de bord</p>
      <div class="dials" data-dials></div>
    </section>

    <!-- ===================== PAS DU JOUR ===================== -->
    <section class="home-section" data-reveal>
      <p class="home-eyebrow">Activité · Pas du jour</p>
      <div data-steptile></div>
    </section>

    <p class="home-foot" style="text-align:center;margin-top:var(--sp-7);font-family:var(--font-mono);font-size:var(--fs-200);color:var(--ink-dim)">
      ⊕ ACHIEVE · 48°34′N 4°45′W · Achieve your dream
    </p>
  </main>

  <script type="module" src="js/home.js"></script>
</body>
</html>
