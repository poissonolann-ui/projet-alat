name: Déploiement GitHub Pages

# Publie l'app statique (zéro-build) sur GitHub Pages à chaque push sur main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on annule les runs en cours superflus.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Active Pages (source = GitHub Actions) si ce n'est pas déjà fait.
      - name: Configurer Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Envoie la racine du dépôt telle quelle (HTML/CSS/JS/polices/SW).
      - name: Empaqueter le site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
