name: Deploy ACHIEVE to GitHub Pages

# Déploie l'app statique sur GitHub Pages à chaque push sur la branche de dev,
# et permet aussi un lancement manuel.
on:
  push:
    branches: [claude/achieve-fitness-pwa-orq1mi]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (active Pages si besoin)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build statique (/dist)
        run: node build.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déploiement Pages
        id: deployment
        uses: actions/deploy-pages@v4
